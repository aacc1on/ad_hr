version: '3.8'

services:
  app:
    build: .
    container_name: ad-hr-reconciliation
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:-change-this-secret}
      DATABASE_PATH: ./data/app.db
      LOG_DIR: ./logs
      UPLOAD_DIR: ./uploads
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
